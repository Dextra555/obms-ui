<div class="wlt-c-furg-content-header">
    <div class="container-fluid">
        <div class="row mb-2">
            <div class="col-12 col-sm-12 col-md-4 col-lg-4">
                <h1 class="md-1">Employee Loan</h1>
            </div><!-- /.col -->
            <div class="col-12 col-sm-12 col-md-8 col-lg-8 my-1">
                <ol class="breadcrumb float-md-right">
                    <li class="breadcrumb-item"><a routerLink="/dashboard">Master</a></li>
                    <li class="breadcrumb-item active">Employee Loan</li>
                </ol>
            </div><!-- /.col -->
        </div><!-- /.row -->
    </div><!-- /.container-fluid -->
</div>
<mat-card>
    <mat-card-content>
        <form [formGroup]="employeeLoanForm" *ngIf="warningMessage ==''">
            <div class="col-12 col-sm-12 col-md-12 col-lg-12">
                <div class="row">
                    <div class="col-12 col-sm-12 col-md-12 col-lg-3">
                        <mat-form-field appearance="outline">
                            <mat-label>Advance Taken Date</mat-label>
                            <div style="display: flex; align-items: center;"> <!-- Flex container -->
                                <input matInput [matDatepicker]="picker" formControlName="AdvanceTakenDate"
                                    (dateChange)="changeAdvanceTakenDate('change', $event)">
                                <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
                            </div>
                            <mat-hint>MM/DD/YYYY</mat-hint>
                            <mat-datepicker #picker></mat-datepicker>
                        </mat-form-field>
                    </div>
                    <div class="col-12 col-sm-12 col-md-12 col-lg-3">
                        <mat-form-field appearance="outline">
                            <mat-label>Advance Process Date</mat-label>
                            <div style="display: flex; align-items: center;">
                                <input matInput [matDatepicker]="picker1" formControlName="AdvanceDate"
                                    (dateChange)="changeAdvanceDate('change', $event)">
                                <mat-datepicker-toggle matIconSuffix [for]="picker1"></mat-datepicker-toggle>
                            </div>
                            <mat-hint>MM/DD/YYYY</mat-hint>
                            <mat-datepicker #picker1></mat-datepicker>
                        </mat-form-field>
                    </div>
                    <div class="col-12 col-sm-12 col-md-4 col-lg-4" hidden>
                        <mat-label class="mr-3"><strong>Type</strong></mat-label>
                        <br />
                        <mat-radio-group aria-label="Select a Type" formControlName="EmployeeType"                           >
                            <mat-radio-button value="Guard">Guard</mat-radio-button>
                            <mat-radio-button value="Staff">Staff</mat-radio-button>
                        </mat-radio-group>
                    </div>
                </div>
            </div>
            <div class="col-12 col-sm-12 col-md-12 col-lg-6">
                <div class="row">
                    <div class="col-12 col-sm-12 col-md-12 col-lg-5">
                        <mat-form-field appearance="outline">
                            <mat-label>Branch Code</mat-label>
                            <mat-select formControlName="BranchCode"
                                (selectionChange)="onBranchSelectionChange($event)">
                                <mat-option *ngFor="let branch of branchModel" [value]="branch.Code">
                                    {{ branch.Code }}
                                </mat-option>
                            </mat-select>
                        </mat-form-field>
                    </div>
                    <div class="col-12 col-sm-12 col-md-12 col-lg-5">
                        <mat-form-field appearance="outline">
                            <mat-label>Employee</mat-label>
                            <mat-select formControlName="EmployeeID"  (selectionChange)="onEmployeeSelectionChange($event)"
                            [disabled]="employeeAdvanceTitleStatus == 'edit'">
                                <mat-option *ngFor="let employee of employeeListModel" [value]="employee.EMP_ID">
                                    {{ employee.EMP_NAME }}
                                </mat-option>
                            </mat-select>
                        </mat-form-field>
                    </div>
                </div>
            </div>
            <div class="col-12 col-sm-12 col-md-12 col-lg-10">
                <div class="row">
                    <div class="col-12 col-sm-12 col-md-4 col-lg-3">
                        <mat-form-field appearance="outline">
                            <mat-label>Voucher No</mat-label>
                            <input type="text" formControlName="VoucherNo" matInput placeholder="" autocomplete="off"
                                readonly="true">
                        </mat-form-field>
                    </div>
                    <div class="col-12 col-sm-12 col-md-4 col-lg-3">
                        <mat-form-field appearance="outline">
                            <mat-label>Amount </mat-label>
                            <input type="text" formControlName="Amount" matInput placeholder="" autocomplete="off"
                                pattern="^\d+(\.\d{1,2})?$" (change)="amountChange($event)">
                        </mat-form-field>
                    </div>
                    <div class="col-12 col-sm-12 col-md-4 col-lg-4">
                        <mat-error *ngIf="employeeLoanForm.controls['Amount'].hasError('pattern')">
                            Only numbers with up to two decimal places are allowed.
                        </mat-error>
                    </div>
                </div>
            </div>
            <div class="col-12 col-sm-12 col-md-12 col-lg-6">
                <div class="row">
                    <div class="col-12 col-sm-12 col-md-4 col-lg-5">
                        <mat-form-field appearance="outline">
                            <mat-label>No of Installments</mat-label>
                            <input type="text" formControlName="NoOfInstallments" matInput placeholder=""
                                autocomplete="off" (change)="noOfInstallmentsChange($event)">
                        </mat-form-field>
                    </div>
                    <div class="col-12 col-sm-12 col-md-4 col-lg-5">
                        <mat-form-field appearance="outline">
                            <mat-label>Monthly Repayment </mat-label>
                            <input type="text" formControlName="MonthlyRepayment" matInput placeholder=""
                                [readonly]="true" autocomplete="off">
                        </mat-form-field>
                    </div>

                </div>
            </div>
            <div class="row">
                <div class="col-12">
                    <div class="text-right">
                        <button class="btn wlt-c-furg-btn-gray mr-3" mat-dialog-close
                            (click)="clearEmployeeLoanDetails()"> Cancel</button>                           
                            <button class="btn wlt-c-furg-btn-gray mr-3" [disabled]="btnPrint == false"
                            (click)="OnPrintClick()"> Print</button>
                            <button class="btn wlt-c-furg-btn-gray mr-3" [disabled]="btnDelete == false"
                            (click)="onDeleteClick()"> Delete</button>
                        <button *ngIf="(this.userAccessModel.updateAccess == true || this.userAccessModel.createAccess == true || currentUser == 'superadmin')"
                        class="btn wlt-c-furg-btn-primary" [disabled]="employeeLoanForm.invalid"
                            (click)="savebuttonClick()"> {{salaryAdvanceID == 0 ? 'Save':
                            'Update'}}</button>
                    </div>
                </div>
            </div>
        </form>
        <div *ngIf="warningMessage !==''">
            <mat-label style="color:red" [innerHTML]="warningMessage"></mat-label>
        </div>
        <div *ngIf="errorMessage !==''">
            <mat-label style="color:red" [innerHTML]="errorMessage"></mat-label>
        </div>
    </mat-card-content>
</mat-card>

<!-- model pop up for logic started -->
<div [style.display]="showLoadingSpinner ? 'block' : 'none'"
    style="margin-top: -10.5rem; display: block; margin-left: -6.5rem;">
    <div class="d-flex justify-content-center">
        <span class="loader"></span>
    </div>
</div>
<!-- model pop up for logic ended -->
