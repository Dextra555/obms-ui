<div class="wlt-c-furg-content-header">
  <div class="container-fluid">
    <div class="row mb-3">
      <div class="col-12 col-sm-12 col-md-8 col-lg-5">
        <h1 class="mb-1">Report/ Finance / Payment Voucher Summary</h1>
      </div><!-- /.col -->
      <div class="col-12 col-sm-12 col-md-8 col-lg-7 my-1">
        <ol class="breadcrumb float-md-right">
          <!--          <li class="breadcrumb-item"><a href="#">Master</a></li>-->
          <li class="breadcrumb-item"><a href="#">Report</a></li>
          <li class="breadcrumb-item active">Payment Voucher Summary</li>
        </ol>
      </div><!-- /.col -->
    </div><!-- /.row -->
  </div><!-- /.container-fluid -->
</div>

<mat-card>
  <mat-card-content>

    <form [formGroup]="frm" (ngSubmit)="onSubmit()">
      <div class="row" *ngIf="warningMessage ===''">
        <div class="payment-period-container" style="display: flex; align-items: center; gap: 8px;">
          <label for="payment-period" style="font-weight: bold; white-space: nowrap;margin: 0px 5px 17px 13px;">Payment
            Period:</label>
          <mat-form-field appearance="outline" style="flex: 1; max-width: 200px;">
            <mat-label>Start Date</mat-label>
            <input type="text" formControlName="StartDate" matInput [matDatepicker]="picker1" placeholder=""
              autocomplete="off">
            <mat-datepicker-toggle matSuffix [for]="picker1"></mat-datepicker-toggle>
            <mat-datepicker #picker1></mat-datepicker>
          </mat-form-field>
          <span style="margin: 0 5px 17px 0;">to</span>
          <mat-form-field appearance="outline" style="flex: 1; max-width: 200px;">
            <mat-label>End Date</mat-label>
            <input type="text" formControlName="EndDate" matInput [matDatepicker]="picker2" placeholder=""
              autocomplete="off">
            <mat-datepicker-toggle matSuffix [for]="picker2"></mat-datepicker-toggle>
            <mat-datepicker #picker2></mat-datepicker>
          </mat-form-field>
        </div>
      </div>
      <div class="row" *ngIf="warningMessage ===''">
        <div class="col-12 col-sm-12 col-md-3 col-lg-3">
          <mat-form-field appearance="outline">
            <mat-label>Bank</mat-label>
            <mat-select formControlName="Bank">
              <mat-option [value]="0"></mat-option>
              <mat-option *ngFor="let d of bankList" value="{{d.BankId}}">{{d.Accname}}</mat-option>
            </mat-select>
          </mat-form-field>
        </div>
        <div class="col-12 col-sm-12 col-md-3 col-lg-3">
          <mat-form-field appearance="outline">
            <mat-label>Branch</mat-label>
            <mat-select formControlName="Branch"  [panelClass]="'custom-dropdown-panel'">
              <mat-option [value]="0"></mat-option>
              <mat-option *ngFor="let d of branchList" value="{{d.Code}}">{{d.Name}}</mat-option>
            </mat-select>
          </mat-form-field>
        </div>
      </div>
      <div class="row" *ngIf="warningMessage ===''">
        <div class="col-12 col-sm-12 col-md-4 col-lg-4">
          <br />
          <mat-radio-group aria-label="Select a Type" formControlName="PaymentType">
            <mat-radio-button value="0">All</mat-radio-button>
            <mat-radio-button value="1">Cheque</mat-radio-button>
            <mat-radio-button value="2">Cash</mat-radio-button>
            <mat-radio-button value="3">Contra</mat-radio-button>
            <mat-radio-button value="4">Online Fund Transfer</mat-radio-button>
          </mat-radio-group>
        </div>
        <div class="col-12 col-sm-12 col-md-3 col-lg-3">
          <br />
          <div class="col-12 col-sm-12 col-md-6 col-lg-4" *ngFor="let item of checklistItems">
            <mat-checkbox [formControlName]="'Purpose_' + item.value">
              {{ item.label }}
            </mat-checkbox>
          </div>
        </div>
        <div class="col-12 col-sm-12 col-md-3 col-lg-3">
          <br />
          <div class="col-12 col-sm-12 col-md-6 col-lg-4">
            <mat-checkbox formControlName="ChequeAmountVisible" value="1">
              Cheque Amount Visible
            </mat-checkbox>
          </div>
        </div>
      </div>
      <div class="row" *ngIf="warningMessage ===''">
        <div class="col-12 col-sm-12 col-md-4 col-lg-10 text-right">
          <div class="btn-group" role="group">
            <button class="btn wlt-c-furg-btn-primary m-1" (click)="clkBtn(1)"> Show</button>
            <button class="btn wlt-c-furg-btn-primary m-1" (click)="clkBtn(2)"> Custom</button>
          </div>
        </div>
      </div>
    </form>
    <br />
    <div *ngIf="warningMessage !==''">
        <mat-label style="color:red" [innerHTML]="warningMessage"></mat-label>
    </div>
    <div *ngIf="errorMessage !==''">
        <mat-label style="color:red" [innerHTML]="errorMessage"></mat-label>
    </div>
    <br/>
    <iframe width="1200px" height="1200px" #myFrame [src]="urlSafe"></iframe>
  </mat-card-content>
</mat-card>

<!-- model pop up for logic started -->
<div [style.display]="showLoadingSpinner ? 'block' : 'none'"
    style="margin-top: -10.5rem; display: block; margin-left: -6.5rem;">
    <div class="d-flex justify-content-center">
        <span class="loader"></span>
    </div>
</div>
<!-- model pop up for logic ended -->
