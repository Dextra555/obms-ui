<div class="wlt-c-furg-content-header">
    <div class="container-fluid">
        <div class="row mb-2">
            <div class="col-12 col-sm-12 col-md-4 col-lg-4">
                <h1 class="mb-1">Reports/Finance/ Indian Invoice Report</h1>
            </div><!-- /.col -->
            <div class="col-12 col-sm-12 col-md-8 col-lg-8 my-1">
                <ol class="breadcrumb float-md-right">
                    <li class="breadcrumb-item"><a href="#">Report</a></li>
                    <li class="breadcrumb-item"><a href="#">Indian Invoice Report</a></li>
                </ol>
            </div><!-- /.col -->
        </div><!-- /.row -->
    </div><!-- /.container-fluid -->
</div>
<mat-card>
    <mat-card-content>
        <form [formGroup]="frm">
            <div class="row" *ngIf="warningMessage ===''">
                <div class="col-12 col-sm-12 col-md-12 col-lg-3">
                    <mat-form-field appearance="outline">
                        <mat-label>Invoice Period</mat-label>
                        <input type="text" formControlName="invoice_period" matInput [matDatepicker]="picker1"
                            placeholder="" autocomplete="off" (dateChange)="changeAdvanceDate()">
                        <mat-datepicker-toggle matSuffix [for]="picker1">
                        </mat-datepicker-toggle>
                        <mat-datepicker #picker1></mat-datepicker>
                    </mat-form-field>
                </div>
                <div class="col-12 col-sm-12 col-md-12 col-lg-4">
                    <mat-form-field appearance="outline">
                        <mat-label>Branch</mat-label>
                        <mat-select formControlName="branch" (selectionChange)="getClients()">
                            <mat-option [value]="0"></mat-option>
                            <mat-option *ngFor="let d of branchList" value="{{d.Code}}">{{d.Name}}</mat-option>
                        </mat-select>
                    </mat-form-field>
                </div>
                <div class="col-12 col-sm-12 col-md-12 col-lg-12"
                    *ngIf="warningMessage ==='' && dataSource?.data && dataSource.data.length > 0">
                    <div class="table-responsive" *ngIf="errorMessage =='' && warningMessage ===''">
                        <mat-checkbox [checked]="false" formControlName="checkAll"
                            (change)="toggleRowCheckboxAll()">Checked All</mat-checkbox>
                        <table mat-table [dataSource]="dataSource" class="wlt-table table-striped" matSort
                            (matSortChange)="announceSortChange($event)">
                            <ng-container matColumnDef="s_no">
                                <th mat-header-cell *matHeaderCellDef mat-sort-header class="s-no-column"> Action </th>
                                <td mat-cell *matCellDef="let element; let i = index" class="s-no-column">
                                    <mat-checkbox [checked]="rowCheckedState[i]"
                                        (change)="toggleRowCheckbox(i,element.ID)"></mat-checkbox>
                                </td>
                            </ng-container>
                            <ng-container matColumnDef="Name">
                                <th mat-header-cell *matHeaderCellDef mat-sort-header> Client Name </th>
                                <td mat-cell *matCellDef="let element" class="text-left"> {{element.Name}} </td>
                            </ng-container>
                            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
                        </table>
                    </div>
                </div>
            </div>
            <br />
            <div class="row" *ngIf="warningMessage ===''">
                <div class="col-12">
                    <div class="text-left">
                        <div class="btn-group" role="group">
                            <button class="btn wlt-c-furg-btn-primary m-1" (click)="printIndianInvoiceClick()"
                                [disabled]="frm.invalid"> Print Indian Invoice</button>
                        </div>
                    </div>
                </div>
            </div>
        </form>
        <div *ngIf="warningMessage !==''">
            <mat-label style="color:red" [innerHTML]="warningMessage"></mat-label>
        </div>
        <div *ngIf="errorMessage !==''">
            <mat-label style="color:red" [innerHTML]="errorMessage"></mat-label>
        </div>
        <br />
        <iframe *ngIf="warningMessage ===''" width="1200px" height="1200px" #myFrame [src]="urlSafe"></iframe>
    </mat-card-content>
</mat-card>

<!-- model pop up for logic started -->
<div [style.display]="showLoadingSpinner ? 'block' : 'none'"
    style="margin-top: -20.5rem; display: block; margin-left: -6.5rem;">
    <div class="d-flex justify-content-center">
        <span class="loader"></span>
    </div>
</div>
<!-- model pop up for logic ended -->
