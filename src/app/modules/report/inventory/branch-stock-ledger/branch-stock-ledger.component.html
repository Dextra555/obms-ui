<div class="wlt-c-furg-content-header">
  <div class="container-fluid">
    <div class="row mb-2">
      <div class="col-12 col-sm-12 col-md-4 col-lg-4">
        <h1 class="mb-1">Report/Branch Stock Ledger</h1>
      </div><!-- /.col -->
      <div class="col-12 col-sm-12 col-md-8 col-lg-8 my-1">
        <ol class="breadcrumb float-md-right">
          <!--          <li class="breadcrumb-item"><a href="#">Master</a></li>-->
          <li class="breadcrumb-item"><a href="#">Report</a></li>
          <li class="breadcrumb-item active">Branch Stock Ledger</li>
        </ol>
      </div><!-- /.col -->
    </div><!-- /.row -->
  </div><!-- /.container-fluid -->
</div>

<mat-card>
  <mat-card-content>

    <form [formGroup]="frm" (ngSubmit)="onSubmit()">
      <div class="row" *ngIf="warningMessage ===''">
        <div class="col-12 col-sm-12 col-md-3 col-lg-3">
          <mat-form-field appearance="outline">
            <mat-label>Branch</mat-label>
            <mat-select formControlName="Branch" >
              <mat-option *ngFor="let d of branchList" value="{{d.Code}}">{{d.Name}}</mat-option>
            </mat-select>
          </mat-form-field>
        </div>
        <div class="col-12 col-sm-12 col-md-3 col-lg-3">
          <mat-form-field appearance="outline">
            <mat-label>Item</mat-label>
            <mat-select formControlName="ItemID">
              <mat-option *ngFor="let d of itemList" value="{{d.ID}}">{{d.Name}}</mat-option>
            </mat-select>
          </mat-form-field>
        </div>
        <div class="col-12 col-sm-12 col-md-2 col-lg-2">
          <mat-form-field appearance="outline">
            <mat-label>Start Date</mat-label>
            <input type="text" formControlName="StartDate" matInput [matDatepicker]="picker1" placeholder="" autocomplete="off">
            <mat-datepicker-toggle matSuffix [for]="picker1">
            </mat-datepicker-toggle>
            <mat-datepicker #picker1></mat-datepicker>
          </mat-form-field>
        </div>
        <div class="col-12 col-sm-12 col-md-2 col-lg-2">
          <mat-form-field appearance="outline">
            <mat-label>End Date</mat-label>
            <input type="text" formControlName="EndDate" matInput [matDatepicker]="picker2" placeholder="" autocomplete="off">
            <mat-datepicker-toggle matSuffix [for]="picker2">
            </mat-datepicker-toggle>
            <mat-datepicker #picker2></mat-datepicker>
          </mat-form-field>
        </div>
        <div class="col-12 col-sm-12 col-md-2 col-lg-2">
          <button class="btn wlt-c-furg-btn-primary"> Search</button>
        </div>
      </div>
    </form>
    <br />
    <div *ngIf="warningMessage !==''">
        <mat-label style="color:red" [innerHTML]="warningMessage"></mat-label>
    </div>
    <div *ngIf="errorMessage !==''">
        <mat-label style="color:red" [innerHTML]="errorMessage"></mat-label>
    </div>
    <iframe *ngIf="warningMessage ===''" width="1200px" height="1200px" #myFrame [src]="urlSafe"></iframe>
  </mat-card-content>
</mat-card>

<!-- model pop up for logic started -->
<div [style.display]="showLoadingSpinner ? 'block' : 'none'"
    style="margin-top: -10.5rem; display: block; margin-left: -6.5rem;">
    <div class="d-flex justify-content-center">
        <span class="loader"></span>
    </div>
</div>
<!-- model pop up for logic ended -->
