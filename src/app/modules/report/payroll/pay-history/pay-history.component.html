<div class="wlt-c-furg-content-header">
  <div class="container-fluid">
    <div class="row mb-2">
      <div class="col-12 col-sm-12 col-md-4 col-lg-4">
        <h1 class="mb-1">Report/Pay History</h1>
      </div><!-- /.col -->
      <div class="col-12 col-sm-12 col-md-8 col-lg-8 my-1">
        <ol class="breadcrumb float-md-right">
          <!--          <li class="breadcrumb-item"><a href="#">Master</a></li>-->
          <li class="breadcrumb-item"><a href="#">Report</a></li>
          <li class="breadcrumb-item active">Pay History</li>
        </ol>
      </div><!-- /.col -->
    </div><!-- /.row -->
  </div><!-- /.container-fluid -->
</div>

<mat-card>
  <mat-card-content>
    <form [formGroup]="frm" (ngSubmit)="onSubmit()">
      <div *ngIf="warningMessage !==''">
        <mat-label style="color:red" [innerHTML]="warningMessage"></mat-label>
      </div>
      <div *ngIf="errorMessage !==''">
        <mat-label style="color:red" [innerHTML]="errorMessage"></mat-label>
      </div>
      <br />
      <div class="row" *ngIf="warningMessage ===''">
        <div class="col-12 col-sm-12 col-md-2 col-lg-2">
          <mat-form-field appearance="outline">
            <mat-label>Start Date</mat-label>
            <input type="text" formControlName="StartDate" (dateChange)="changeAdvanceDate('change', $event)" matInput
              [matDatepicker]="picker1" placeholder="" autocomplete="off">
            <mat-datepicker-toggle matSuffix [for]="picker1">
            </mat-datepicker-toggle>
            <mat-datepicker #picker1></mat-datepicker>
          </mat-form-field>
        </div>
        <div class="col-12 col-sm-12 col-md-2 col-lg-2">
          <mat-form-field appearance="outline">
            <mat-label>End Date</mat-label>
            <input type="text" formControlName="EndDate" (dateChange)="changeAdvanceDate('change', $event)" matInput
              [matDatepicker]="picker2" placeholder="" autocomplete="off">
            <mat-datepicker-toggle matSuffix [for]="picker2">
            </mat-datepicker-toggle>
            <mat-datepicker #picker2></mat-datepicker>
          </mat-form-field>
        </div>

        <div class="col-12 col-sm-12 col-md-3 col-lg-3">
          <mat-form-field appearance="outline">
            <mat-label>Branch</mat-label>
            <mat-select formControlName="Branch" (selectionChange)="onBranchSelectionChange($event)">
              <mat-option value=""></mat-option>
              <mat-option *ngFor="let d of branchModel" value="{{d.Code}}">{{d.Code}}</mat-option>
            </mat-select>
          </mat-form-field>
        </div>
        <div class="col-12 col-sm-12 col-md-3 col-lg-3"></div>
        <div class="col-12 col-sm-12 col-md-3 col-lg-3">
          <mat-label class="mr-3"><strong>Employee Type</strong></mat-label>
          <br />
          <mat-radio-group aria-label="Select a Type" formControlName="EmployeeType"
            (change)="radioButtonTypeSelectionChange($event)">
            <mat-radio-button value="Guard">Guard</mat-radio-button>
            <mat-radio-button value="Staff">Staff</mat-radio-button>
            <mat-radio-button value="FGuard">Foreign Guard</mat-radio-button>
          </mat-radio-group>
        </div>
        <div class="col-12 col-sm-12 col-md-2 col-lg-8">
          <button class="btn wlt-c-furg-btn-primary m-1" (click)="generateExcelFileClick()">Generate Excel File</button>
        </div>

        <div class="col-12 col-sm-12 col-md-3 col-lg-3">
          <mat-form-field appearance="outline">
            <mat-label>Employee Name</mat-label>
            <mat-select formControlName="Employee">
              <mat-option value=""></mat-option>
              <mat-option *ngFor="let employee of employeeListModel" [ngStyle]="{
                  'background-color': isEmployeeInNameList(employee.EMP_CODE) 
                    ? 'yellow' 
                    : isEmployeeProcessList(employee.EMP_CODE) 
                    ? 'red' 
                    : 'white',
                  'padding': '8px 16px',
                  'margin-bottom': '4px'
                }" [value]="employee.EMP_CODE">
                {{ employee.EMP_NAME }}
              </mat-option>
            </mat-select>
          </mat-form-field>
        </div>

        <div class="col-12 col-sm-12 col-md-2 col-lg-2">
          <button class="btn wlt-c-furg-btn-primary"> Show</button>
        </div>
      </div>
    </form>
    <br />
    <iframe *ngIf="warningMessage ===''" width="1200px" height="1200px" #myFrame [src]="urlSafe"></iframe>
  </mat-card-content>
</mat-card>

<!-- model pop up for logic started -->
<div [style.display]="showLoadingSpinner ? 'block' : 'none'"
  style="margin-top: -10.5rem; display: block; margin-left: -6.5rem;">
  <div class="d-flex justify-content-center">
    <span class="loader"></span>
  </div>
</div>
<!-- model pop up for logic ended -->
