<div class="wlt-c-furg-content-header">
  <div class="container-fluid">
    <div class="row mb-2">
      <div class="col-12 col-sm-12 col-md-4 col-lg-4">
        <h1 class="mb-1">Report/Pay Sheet Report</h1>
      </div><!-- /.col -->
      <div class="col-12 col-sm-12 col-md-8 col-lg-8 my-1">
        <ol class="breadcrumb float-md-right">
          <!--          <li class="breadcrumb-item"><a href="#">Master</a></li>-->
          <li class="breadcrumb-item"><a href="#">Report</a></li>
          <li class="breadcrumb-item active">Pay Sheet Report</li>
        </ol>
      </div><!-- /.col -->
    </div><!-- /.row -->
  </div><!-- /.container-fluid -->
</div>

<mat-card>
  <mat-card-content>

    <form [formGroup]="frm" (ngSubmit)="onSubmit()">
      <div class="row" *ngIf="warningMessage ===''">
        <div class="col-12 col-sm-12 col-md-4 col-lg-4">
          <mat-form-field appearance="outline">
            <mat-label>Salary Period</mat-label>
            <input type="text" formControlName="Period" matInput [matDatepicker]="picker1" placeholder=""
              autocomplete="off" (dateChange)="changeAdvanceDate('change', $event)">
            <mat-datepicker-toggle matSuffix [for]="picker1">
            </mat-datepicker-toggle>
            <mat-datepicker #picker1></mat-datepicker>
          </mat-form-field>
        </div>
        <div class="col-12 col-sm-12 col-md-4 col-lg-4">
          <mat-form-field appearance="outline">
            <mat-label>Branch</mat-label>
            <mat-select formControlName="Branch" (selectionChange)="onBranchSelectionChange($event)">
              <mat-option value="0"></mat-option>
              <mat-option *ngFor="let d of branchList" value="{{d.Code}}">{{d.Name}}</mat-option>
            </mat-select>
          </mat-form-field>
        </div>
        <div class="col-12 col-sm-12 col-md-4 col-lg-4">
          
        </div>
        <div class="col-12 col-sm-12 col-md-4 col-lg-2">
          <mat-label class="mr-3"><strong>Employee Type</strong></mat-label>
          <br />
          <mat-radio-group aria-label="Select a Type" formControlName="EmployeeType">
            <mat-radio-button value="Guard">Guard</mat-radio-button>
            <mat-radio-button value="Staff">Staff</mat-radio-button>
          </mat-radio-group>
        </div>
        <div class="col-12 col-sm-12 col-md-4 col-lg-2">          
          <button class="btn wlt-c-furg-btn-primary m-1"
            (click)="generateExcelFileClick()">Generate Excel File</button>         
        </div>
        <div class="col-12 col-sm-12 col-md-12 col-lg-12">
          <mat-radio-group aria-label="Select a Type" formControlName="RepOption">
            <mat-radio-button value="0">All</mat-radio-button>
            <mat-radio-button value="1">Bank</mat-radio-button>
            <mat-radio-button value="2">Cash</mat-radio-button>
            <mat-radio-button value="3">Cheque</mat-radio-button>
            <mat-radio-button value="4">Temporary Employee</mat-radio-button>
            <mat-radio-button value="5">Local Employee</mat-radio-button>
            <mat-radio-button value="6">Foreigner Employee</mat-radio-button>
          </mat-radio-group>
        </div>
      </div>
      <div class="row" *ngIf="warningMessage ===''">
        <div class="col-12">
          <div class="text-right">
            <div class="btn-group" role="group">
              <button class="btn wlt-c-furg-btn-primary m-1" (click)="clkBtn(0)"> Show</button>
            </div>
          </div>
        </div>
      </div>
    </form>
    <br />
    <div *ngIf="warningMessage !==''">
      <mat-label style="color:red" [innerHTML]="warningMessage"></mat-label>
    </div>
    <div *ngIf="errorMessage !==''">
      <mat-label style="color:red" [innerHTML]="errorMessage"></mat-label>
    </div>
    <iframe *ngIf="warningMessage ===''" width="1200px" height="900px" #myFrame [src]="urlSafe"></iframe>
  </mat-card-content>
</mat-card>

<!-- model pop up for logic started -->
<div [style.display]="showLoadingSpinner ? 'block' : 'none'"
  style="margin-top: -10.5rem; display: block; margin-left: -6.5rem;">
  <div class="d-flex justify-content-center">
    <span class="loader"></span>
  </div>
</div>
<!-- model pop up for logic ended -->
