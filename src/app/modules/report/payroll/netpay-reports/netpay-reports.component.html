<div class="wlt-c-furg-content-header">
    <div class="container-fluid">
        <div class="row mb-2">
            <div class="col-12 col-sm-12 col-md-4 col-lg-4">
                <h1 class="md-1">Salary Statement</h1>
            </div><!-- /.col -->
            <div class="col-12 col-sm-12 col-md-8 col-lg-8 my-1">
                <ol class="breadcrumb float-md-right">
                    <li class="breadcrumb-item"><a routerLink="/dashboard">Master</a></li>
                    <li class="breadcrumb-item">Salary Statement
                    </li>
                </ol>
            </div><!-- /.col -->
        </div><!-- /.row -->
    </div><!-- /.container-fluid -->
</div>
<mat-card>
    <mat-card-content>
        <form [formGroup]="salaryForm">
            <div class="row" *ngIf="warningMessage ===''">
                <div class="col-12 col-sm-12 col-md-12 col-lg-2">
                    <mat-form-field appearance="outline">
                        <mat-label>Advance Date</mat-label>
                        <div style="display: flex; align-items: center;">
                            <input matInput [matDatepicker]="picker" formControlName="AdvanceDate"
                                (dateChange)="changeAdvanceDate('change', $event)">
                            <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
                        </div>
                        <mat-hint>MM/DD/YYYY</mat-hint>
                        <mat-datepicker #picker></mat-datepicker>
                    </mat-form-field>
                </div>
                <div class="col-12 col-sm-12 col-md-12 col-lg-4">
                    <mat-form-field appearance="outline">
                        <mat-label>Branch Code</mat-label>
                        <mat-select formControlName="BranchCode">
                            <mat-option *ngFor="let branch of branchModel" [value]="branch.Code">
                                {{ branch.Code }}
                            </mat-option>
                        </mat-select>
                    </mat-form-field>
                </div>
                <div class="col-12 col-sm-12 col-md-12 col-lg-4" *ngIf="errorMessage !==''">
                    <mat-label style="color:red">{{errorMessage}}</mat-label>
                </div>
            </div>
            <div class="row" *ngIf="warningMessage ===''">
                <div class="col-12 col-sm-12 col-md-4 col-lg-8" *ngIf="warningMessage ===''">
                    <mat-label class="mr-3"><strong>Employee Type</strong></mat-label>
                    <br />
                    <mat-radio-group aria-label="Select a Type" formControlName="EmployeeType">
                        <mat-radio-button value="Guard">Guard</mat-radio-button>
                        <mat-radio-button value="Staff">Staff</mat-radio-button>
                    </mat-radio-group>
                </div>
            </div>
            <div class="row" *ngIf="warningMessage ===''">
                <div class="col-12 col-sm-12 col-md-4 col-lg-3">
                    <mat-label class="mr-3"><strong>Payment Mode</strong></mat-label>
                    <br />
                    <mat-radio-group aria-label="Select a Race" formControlName="PaymentType">
                        <mat-radio-button value="Bank">Bank</mat-radio-button>
                        <mat-radio-button value="Cash">Cash</mat-radio-button>
                        <mat-radio-button value="Cheque">Cheque</mat-radio-button>
                        <mat-radio-button value="ALL">All</mat-radio-button>
                    </mat-radio-group>
                </div>
                <div class="col-12 col-sm-12 col-md-4 col-lg-6">
                    <div class="text-left">
                        <div class="btn-group" role="group">
                            <button class="btn wlt-c-furg-btn-primary mx-1" [disabled]="salaryForm.invalid"
                                (click)="getReportShowClick()">Show </button>&nbsp;
                            <button class="btn wlt-c-furg-btn-primary mx-1" [disabled]="salaryForm.invalid"
                                (click)="getReportGuard1Click()" hidden>Show Guard 1 </button>&nbsp;
                            <button class="btn wlt-c-furg-btn-primary mx-1" [disabled]="salaryForm.invalid"
                                (click)="getReportGuard2Click()" hidden>Show Guard 2</button>&nbsp;
                            <button class="btn wlt-c-furg-btn-primary mx-1" [disabled]="salaryForm.invalid"
                                (click)="getReportAttendanceClick()">W/O Attendance </button>&nbsp;
                        </div>
                    </div>
                </div>
            </div>
        </form>
        <br />
        <div *ngIf="warningMessage !==''">
            <mat-label style="color:red" [innerHTML]="warningMessage"></mat-label>
        </div>
        <div *ngIf="errorMessage !==''">
            <mat-label style="color:red" [innerHTML]="errorMessage"></mat-label>
        </div>
        <iframe *ngIf="warningMessage ===''" width="1200px" height="1200px" #myFrame [src]="urlSafe"></iframe>
    </mat-card-content>
</mat-card>

<!-- model pop up for logic started -->
<div [style.display]="showLoadingSpinner ? 'block' : 'none'"
    style="margin-top: -10.5rem; display: block; margin-left: -6.5rem;">
    <div class="d-flex justify-content-center">
        <span class="loader"></span>
    </div>
</div>
<!-- model pop up for logic ended -->
