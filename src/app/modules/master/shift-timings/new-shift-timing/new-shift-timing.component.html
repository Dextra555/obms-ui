<div class="wlt-c-furg-content-header">
    <div class="container-fluid">
        <div class="row mb-2">
            <div class="col-12 col-sm-12 col-md-4 col-lg-4">
                <h1 class="mb-1">{{shiftTitleStatus == 'new'?'New Shift Timing':'Edit Shift Timing'}}</h1>
            </div><!-- /.col -->
            <div class="col-12 col-sm-12 col-md-8 col-lg-8 my-1">
                <ol class="breadcrumb float-md-right">
                    <li class="breadcrumb-item"><a routerLink="/dashboard">Master</a></li>
                    <li class="breadcrumb-item"><a routerLink="master/shift-timings">Shift Timing</a></li>
                    <li class="breadcrumb-item active">{{shiftTitleStatus == 'new'?'New Shift Timing':'Edit Shift Timing'}}</li>
                </ol>
            </div><!-- /.col -->
        </div><!-- /.row -->
    </div><!-- /.container-fluid -->
</div>
<mat-card>
    <mat-card-content>
        <form [formGroup]="frm">
            <div class="row">
                <div class="col-12 col-sm-12 col-md-6 col-lg-6">
                    <mat-form-field appearance="outline">
                        <mat-label>Shift Name</mat-label>
                        <input type="text" formControlName="shift_name" matInput placeholder="" autocomplete="off">
                    </mat-form-field>
                </div>
            </div>
            <div class="row">
                <div class="col-12 col-sm-12 col-md-6 col-lg-6">
                    <mat-label>Timing</mat-label>
                    <div class="row">
                        <div class="col-12 col-sm-12 col-md-6 col-lg-6">
                            <mat-form-field appearance="outline">
                                <mat-label>From</mat-label>
                                <mat-select formControlName="timing_from">
                                    <mat-option value="State1">
                                        1 AM 
                                    </mat-option>
                                    <mat-option value="State2">
                                       2 AM
                                    </mat-option>
                                    <mat-option value="State3">
                                        3 AM
                                    </mat-option>
                                </mat-select>
                            </mat-form-field>
                        </div>
                        <div class="col-12 col-sm-12 col-md-6 col-lg-6">
                            <mat-form-field appearance="outline">
                                <mat-label>To</mat-label>
                                <mat-select formControlName="timing_to">
                                    <mat-option value="State1">
                                        1 AM 
                                    </mat-option>
                                    <mat-option value="State2">
                                       2 AM
                                    </mat-option>
                                    <mat-option value="State3">
                                        3 AM
                                    </mat-option>
                                </mat-select>
                            </mat-form-field>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-12">
                    <div class="text-right">
                        <button class="btn wlt-c-furg-btn-gray mr-3" mat-dialog-close> Cancel</button>
                        <button class="btn wlt-c-furg-btn-primary"> Save</button>
                    </div>
                </div>
            </div>
        </form>
    </mat-card-content>
</mat-card>
