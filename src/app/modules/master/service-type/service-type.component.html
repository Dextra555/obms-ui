<div class="wlt-c-furg-content-header">
  <div class="container-fluid">
    <div class="row mb-2">
      <div class="col-12 col-sm-12 col-md-6 col-lg-6">
        <h1 class="mb-1">Service Type Master</h1>
      </div><!-- /.col -->
      <div class="col-12 col-sm-12 col-md-6 col-lg-6 my-1">
        <ol class="breadcrumb float-md-right">
          <li class="breadcrumb-item"><a routerLink="/dashboard">Master</a></li>
          <li class="breadcrumb-item active">Service Type</li>
        </ol>
      </div><!-- /.col -->
    </div><!-- /.row -->
  </div><!-- /.container-fluid -->
</div>

<mat-card>
  <mat-card-content>
    <div class="row" *ngIf="!showLoadingSpinner && !errorMessage">
      <div class="col-12 col-sm-12 col-md-4 col-lg-4 order-2 order-md-1">
        <div class="text-right">
          <mat-form-field appearance="outline">
            <mat-label>Search</mat-label>
            <input matInput (keyup)="applyFilter($event)" placeholder="" #input>
          </mat-form-field>
        </div>
      </div>
      <div class="col-12 col-sm-12 col-md-8 col-lg-8 order-1 order-md-2">
        <div class="text-right pt-2">
          <button class="btn wlt-c-furg-btn-primary" (click)="addNewServiceType()">
            <mat-icon>add</mat-icon><span>New Service Type</span>
          </button>
        </div>
      </div>
    </div>

    <div class="table-responsive" *ngIf="!showLoadingSpinner && !errorMessage">
      <table mat-table [dataSource]="dataSource" class="wlt-table table-striped" matSort
        (matSortChange)="announceSortChange($event)">

        <!-- Service Name Column -->
        <ng-container matColumnDef="serviceName">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Service Name</th>
          <td mat-cell *matCellDef="let row">
            <strong>{{ row.ServiceName }}</strong>
          </td>
        </ng-container>

        <!-- HSN Code Column -->
        <ng-container matColumnDef="hsnCode">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>HSN Code</th>
          <td mat-cell *matCellDef="let row">
            <code class="text-info">{{ row.HSNCode }}</code>
          </td>
        </ng-container>

        <!-- Status Column -->
        <ng-container matColumnDef="isActive">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Status</th>
          <td mat-cell *matCellDef="let row">
            <span class="badge badge-success" *ngIf="row.IsActive">Active</span>
            <span class="badge badge-secondary" *ngIf="!row.IsActive">Inactive</span>
          </td>
        </ng-container>

        <!-- Action Column -->
        <ng-container matColumnDef="action" stickyEnd>
          <th mat-header-cell *matHeaderCellDef style="text-align:center; width: 120px;">Actions</th>
          <td mat-cell *matCellDef="let row" style="text-align:center;">
            <a style="cursor:pointer;" class="wlt-c-furg-text-warning mr-2" matTooltip="Edit"
              (click)="editServiceType(row)">
              <mat-icon aria-hidden="false" aria-label="edit icon">edit</mat-icon>
            </a>
            <a style="cursor:pointer;" class="wlt-c-furg-text-danger" matTooltip="Delete"
              (click)="deleteServiceType(row.Id)">
              <mat-icon aria-hidden="false" aria-label="trash icon">delete_outline</mat-icon>
            </a>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>

      <mat-paginator [pageSizeOptions]="[10, 20, 30]" [pageSize]="10" showFirstLastButtons showPageSizeOptions
        aria-label="Select page of service types">
      </mat-paginator>
    </div>

    <div *ngIf="errorMessage !==''">
      <mat-label style="color:red" [innerHTML]="errorMessage"></mat-label>
    </div>
  </mat-card-content>
</mat-card>

<!-- Loading Spinner -->
<div [style.display]="showLoadingSpinner ? 'block' : 'none'"
  style="margin-top: -20.5rem; display: block; margin-left: -6.5rem;">
  <div class="d-flex justify-content-center">
    <span class="loader"></span>
  </div>
</div>
