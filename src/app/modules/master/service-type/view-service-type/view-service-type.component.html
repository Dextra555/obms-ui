<div class="wlt-c-furg-content-header">
  <div class="container-fluid">
    <div class="row mb-2">
      <div class="col-12 col-sm-12 col-md-6 col-lg-6">
        <h1 class="mb-1">Service Type Details</h1>
      </div>
      <div class="col-12 col-sm-12 col-md-6 col-lg-6 my-1">
        <ol class="breadcrumb float-md-right">
          <li class="breadcrumb-item"><a routerLink="/dashboard">Master</a></li>
          <li class="breadcrumb-item"><a routerLink="/master/service-type">Service Type</a></li>
          <li class="breadcrumb-item active">Details</li>
        </ol>
      </div>
    </div>
  </div>
</div>

<mat-card *ngIf="serviceType">
  <mat-card-content>
    <div class="row">
      <div class="col-12">
        <div class="d-flex justify-content-end mb-3">
          <button mat-raised-button color="primary" class="mr-2" (click)="editServiceType()">
            <mat-icon>edit</mat-icon> Edit
          </button>
          <button mat-raised-button color="accent" (click)="goBack()">
            <mat-icon>arrow_back</mat-icon> Back
          </button>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="col-12 col-sm-12 col-md-6 col-lg-6">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Service Name</mat-label>
          <input matInput [value]="serviceType.ServiceName" readonly>
        </mat-form-field>
      </div>

      <div class="col-12 col-sm-12 col-md-6 col-lg-6">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Service Code</mat-label>
          <input matInput [value]="serviceType.ServiceCode || 'Auto-generated'" readonly>
        </mat-form-field>
      </div>
    </div>

    <div class="row">
      <div class="col-12 col-sm-12 col-md-6 col-lg-6">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>HSN Code</mat-label>
          <input matInput [value]="serviceType.HSNCode" readonly>
        </mat-form-field>
      </div>

      <div class="col-12 col-sm-12 col-md-6 col-lg-6">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Status</mat-label>
          <input matInput [value]="serviceType.IsActive ? 'Active' : 'Inactive'" readonly>
        </mat-form-field>
      </div>
    </div>


    <div class="row mt-3">
      <div class="col-12 col-sm-12 col-md-6 col-lg-6">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Created Date</mat-label>
          <input matInput [value]="serviceType.CreatedDate | date:'medium'" readonly>
        </mat-form-field>
      </div>

      <div class="col-12 col-sm-12 col-md-6 col-lg-6">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Created By</mat-label>
          <input matInput [value]="serviceType.CreatedBy" readonly>
        </mat-form-field>
      </div>
    </div>

    <div class="row" *ngIf="serviceType.LastUpdatedDate">
      <div class="col-12 col-sm-12 col-md-6 col-lg-6">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Last Updated Date</mat-label>
          <input matInput [value]="serviceType.LastUpdatedDate | date:'medium'" readonly>
        </mat-form-field>
      </div>

      <div class="col-12 col-sm-12 col-md-6 col-lg-6">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Last Updated By</mat-label>
          <input matInput [value]="serviceType.LastUpdatedBy || 'N/A'" readonly>
        </mat-form-field>
      </div>
    </div>
  </mat-card-content>
</mat-card>

<!-- Loading Spinner -->
<div [style.display]="showLoadingSpinner ? 'block' : 'none'"
  style="margin-top: -20.5rem; display: block; margin-left: -6.5rem;">
  <div class="d-flex justify-content-center">
    <span class="loader"></span>
  </div>
</div>
