<div class="wlt-c-furg-content-header">
  <div class="container-fluid">
    <div class="row mb-2">
      <div class="col-12 col-sm-12 col-md-6 col-lg-6">
        <h1 class="mb-1">TDS Slab Configuration</h1>
      </div><!-- /.col -->
      <div class="col-12 col-sm-12 col-md-6 col-lg-6 my-1">
        <ol class="breadcrumb float-md-right">
          <li class="breadcrumb-item"><a routerLink="/dashboard">Master</a></li>
          <li class="breadcrumb-item active">TDS Slab</li>
        </ol>
      </div><!-- /.col -->
    </div><!-- /.row -->
  </div><!-- /.container-fluid -->
</div>
<mat-card>
  <mat-card-content>
    <div class="row" *ngIf="errorMessage === ''">
      <div class="col-12 col-sm-12 col-md-4 col-lg-4 order-2 order-md-1">
        <div class="text-right">
          <mat-form-field appearance="outline">
            <mat-label>Search</mat-label>
            <input matInput (keyup)="applyFilter($event)" placeholder="" #input>
          </mat-form-field>
        </div>
      </div>
      <div class="col-12 col-sm-12 col-md-8 col-lg-8 order-1 order-md-2">
        <div class="text-right pt-2">
          <button *ngIf="(this.userAccessModel.createAccess == true || currentUser == 'superadmin')"
            class="btn wlt-c-furg-btn-primary" (click)="addNewTDSSlab()">
            <mat-icon>add</mat-icon>
            <span>New TDS Slab</span>
          </button>
        </div>
      </div>
    </div>
              <div class="table-responsive" *ngIf="!showLoadingSpinner && !errorMessage">
      <table mat-table [dataSource]="dataSource" class="wlt-table table-striped" matSort
        (matSortChange)="announceSortChange($event)">
        <!-- Min Income Column -->
        <ng-container matColumnDef="minIncome">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Min Income (₹)</th>
          <td mat-cell *matCellDef="let row">
            <span class="badge badge-info">₹{{ row.MinIncome | number: '1.2-2' }}</span>
          </td>
        </ng-container>

        <!-- Max Income Column -->
        <ng-container matColumnDef="maxIncome">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Max Income (₹)</th>
          <td mat-cell *matCellDef="let row">
            <span class="badge badge-warning" *ngIf="row.MaxIncome">₹{{ row.MaxIncome | number: '1.2-2' }}</span>
            <span class="badge badge-secondary" *ngIf="!row.MaxIncome">No Limit</span>
          </td>
        </ng-container>

        <!-- Tax Rate Column -->
        <ng-container matColumnDef="taxRate">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Tax Rate (%)</th>
          <td mat-cell *matCellDef="let row">
            <span class="badge badge-primary">{{ row.TaxRate }}%</span>
          </td>
        </ng-container>

        <!-- Status Column -->
        <ng-container matColumnDef="isActive">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Status</th>
          <td mat-cell *matCellDef="let row">
            <span class="badge badge-success" *ngIf="row.IsActive">Active</span>
            <span class="badge badge-secondary" *ngIf="!row.IsActive">Inactive</span>
          </td>
        </ng-container>

        <!-- Action Column -->
        <ng-container matColumnDef="action" stickyEnd>
          <th mat-header-cell *matHeaderCellDef style="text-align:center; width: 120px;">Actions</th>
          <td mat-cell *matCellDef="let row" style="text-align:center;">
            <a *ngIf="(this.userAccessModel.readAccess == true || currentUser == 'superadmin')" 
               style="cursor:pointer;" class="wlt-c-furg-text-primary mr-2" matTooltip="View"
               (click)="viewTDSSlabDetails(row)">
              <mat-icon aria-hidden="false" aria-label="view icon">visibility</mat-icon>
            </a>
            <a *ngIf="(this.userAccessModel.readAccess == true || currentUser == 'superadmin')" 
               style="cursor:pointer;" class="wlt-c-furg-text-warning mr-2" matTooltip="Edit"
               (click)="editTDSSlab(row)">
              <mat-icon aria-hidden="false" aria-label="edit icon">edit</mat-icon>
            </a>
            <a *ngIf="(this.userAccessModel.deleteAccess == true || currentUser == 'superadmin')"
               style="cursor:pointer;" class="wlt-c-furg-text-danger" matTooltip="Delete"
               (click)="deleteTDSSlab(row.Id)">
              <mat-icon aria-hidden="false" aria-label="trash icon">delete_outline</mat-icon>
            </a>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>

      <mat-paginator 
        [pageSizeOptions]="[10, 20, 30]"
        [pageSize]="10"
        showFirstLastButtons
        showPageSizeOptions
        aria-label="Select page of TDS configurations">
      </mat-paginator>
    </div>
    
    <div *ngIf="errorMessage !==''">
      <mat-label style="color:red" [innerHTML]="errorMessage"></mat-label>
    </div>
  </mat-card-content>
</mat-card>
