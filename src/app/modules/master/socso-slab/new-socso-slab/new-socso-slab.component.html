<div class="wlt-c-furg-content-header">
    <div class="container-fluid">
        <div class="row mb-2">
            <div class="col-12 col-sm-12 col-md-4 col-lg-4">
                <h1 class="mb-1">{{socsoTitleStatus == 'new'?'New SOCSO Slab': 'Edit SOCSO Slab'}}</h1>
            </div><!-- /.col -->
            <div class="col-12 col-sm-12 col-md-8 col-lg-8 my-1">
                <ol class="breadcrumb float-md-right">
                    <li class="breadcrumb-item"><a routerLink="/dashboard">Master</a></li>
                    <li class="breadcrumb-item"><a routerLink="/master/socso-slab">SOCSO Slab</a></li>
                    <li class="breadcrumb-item active">{{socsoTitleStatus == 'new'?'New SOCSO Slab': 'Edit SOCSO Slab'}}</li>
                </ol>
            </div><!-- /.col -->
        </div><!-- /.row -->
    </div><!-- /.container-fluid -->
</div>
<mat-card>
    <mat-card-content>
        <form [formGroup]="socsoForm">
            <div class="row">
                <div class="col-12 col-sm-12 col-md-6 col-lg-4">
                    <mat-form-field appearance="outline">
                        <mat-label>Salary Start</mat-label>
                        <input type="text" formControlName="socso_from" matInput placeholder="" autocomplete="off">
                    </mat-form-field>
                </div>
                <div class="col-12 col-sm-12 col-md-6 col-lg-4">
                    <mat-form-field appearance="outline">
                        <mat-label>Salary End</mat-label>
                        <input type="text" formControlName="socso_to" matInput placeholder="" autocomplete="off">
                    </mat-form-field>
                </div>
                <div class="col-12 col-sm-12 col-md-4 col-lg-4">
                    <mat-form-field appearance="outline">
                        <mat-label>Employee Contribution</mat-label>
                        <input type="text" formControlName="socso_worker" matInput placeholder="" autocomplete="off">
                    </mat-form-field>
                </div>
                <div class="col-12 col-sm-12 col-md-4 col-lg-4">
                    <mat-form-field appearance="outline">
                        <mat-label>Employer Contribution</mat-label>
                        <input type="text" formControlName="socso_employer" matInput placeholder="" autocomplete="off">
                    </mat-form-field>
                </div>
                <div class="col-12 col-sm-12 col-md-4 col-lg-4">
                    <mat-form-field appearance="outline">
                        <mat-label>Employer Contribution (Over 55 Years)</mat-label>
                        <input type="text" formControlName="socso_50year" matInput placeholder="" autocomplete="off">
                    </mat-form-field>
                </div>

            </div>
            <div class="row">
                <div class="col-12">
                    <div class="text-right">
                        <button class="btn wlt-c-furg-btn-gray mr-3" mat-dialog-close (click)="clearSOCSODetails()"> Cancel</button>
                        <button *ngIf="this.userAccessModel.createAccess == true || this.userAccessModel.updateAccess == true || currentUser == 'superadmin'" 
                        class="btn wlt-c-furg-btn-primary" (click)="savebuttonClick()"> {{socsoForm.get('socso_id')?.value === 0 ? 'Save' : 'Update' }}</button>
                    </div>
                </div>
            </div>
        </form>
    </mat-card-content>
</mat-card>

<!-- model pop up for logic started -->
<div [style.display]="showLoadingSpinner ? 'block' : 'none'"
    style="margin-top: -20.5rem; display: block; margin-left: -6.5rem;">
    <div class="d-flex justify-content-center">
        <span class="loader"></span>
    </div>
</div>
<!-- model pop up for logic ended -->
