<div class="wlt-c-furg-content-header">
    <div class="container-fluid">
        <div class="row mb-2">
            <div class="col-12 col-sm-12 col-md-4 col-lg-4">
                <h1 class="mb-1">Employee Transfer</h1>
            </div><!-- /.col -->
            <div class="col-12 col-sm-12 col-md-8 col-lg-8 my-1">
                <ol class="breadcrumb float-md-right">
                    <li class="breadcrumb-item"><a href="#">Master</a></li>
                    <li class="breadcrumb-item"><a href="#">Employee Transfer</a></li>
                </ol>
            </div><!-- /.col -->
        </div><!-- /.row -->
    </div><!-- /.container-fluid -->
</div>
<mat-card>
    <mat-card-content>
        <form [formGroup]="frm" (ngSubmit)="onSubmit()">
            <div class="row" *ngIf="warningMessage == ''">
                <div class="col-12 col-sm-12 col-md-12 col-lg-12 wlt-c-furg-profile">
                    <h2><span>From</span></h2>
                </div>
                <div class="col-12 col-sm-12 col-md-4 col-lg-4">
                    <mat-form-field appearance="outline">
                        <mat-label>Branch</mat-label>
                        <mat-select formControlName="FROM_BRANCH_ID">
                            <mat-option *ngFor="let d of branchList" value="{{d.Code}}">{{d.ShortName}}</mat-option>
                        </mat-select>
                    </mat-form-field>
                </div>
                <div class="col-12 col-sm-12 col-md-4 col-lg-4 d-flex select-popup">
                    <mat-form-field appearance="outline">
                        <mat-label>Employee No</mat-label>
                        <input type="text" formControlName="emp_no" matInput placeholder="" autocomplete="off">
                    </mat-form-field>
                    <a class="btn btn-field-popup" matTooltip="Serach Employee" (click)="searchEmployee()">
                        <mat-icon>search</mat-icon>
                    </a>
                </div>
                <div class="col-12 col-sm-12 col-md-4 col-lg-4">
                    <mat-label class="mr-3"><strong>Type</strong></mat-label><br />
                    <mat-radio-group aria-label="Select a Type" formControlName="type">
                        <mat-radio-button value="Guard">Guard</mat-radio-button>
                        <mat-radio-button value="Staff">Staff</mat-radio-button>
                    </mat-radio-group>
                </div>
                <div class="col-12 col-sm-12 col-md-4 col-lg-4">
                    <mat-form-field appearance="outline">
                        <mat-label>Name</mat-label>
                        <input type="text" formControlName="emp_name" matInput placeholder="" autocomplete="off">
                    </mat-form-field>
                </div>
                <div class="col-12 col-sm-12 col-md-4 col-lg-4">
                    <mat-form-field appearance="outline">
                        <mat-label>Transfer Date</mat-label>
                        <input type="text" formControlName="TRANSFER_DATE" matInput [matDatepicker]="picker1"
                            placeholder="" autocomplete="off">
                        <mat-datepicker-toggle matSuffix [for]="picker1">
                        </mat-datepicker-toggle>
                        <mat-datepicker #picker1></mat-datepicker>
                    </mat-form-field>
                </div>
            </div>
            <div class="row" *ngIf="warningMessage == ''">
                <div class="col-12 col-sm-12 col-md-12 col-lg-12 wlt-c-furg-profile">
                    <h2><span>To</span></h2>
                </div>
                <div class="col-12 col-sm-12 col-md-4 col-lg-4">
                    <mat-form-field appearance="outline">
                        <mat-label>Branch</mat-label>
                        <mat-select formControlName="TO_BRANCH_ID" (selectionChange)="onBranchChange($event)">
                            <mat-option *ngFor="let d of branchTOList" value="{{d.Code}}">{{d.ShortName}}</mat-option>
                        </mat-select>
                    </mat-form-field>
                </div>
                <div class="col-12 col-sm-12 col-md-4 col-lg-4">
                    <mat-form-field appearance="outline">
                        <mat-label>Client</mat-label>
                        <mat-select formControlName="TO_CLIENT_ID" (selectionChange)="onClientChange($event)">
                            <mat-option *ngFor="let d of clientTOList" value="{{d.Code}}">{{d.Name}}</mat-option>
                        </mat-select>
                    </mat-form-field>
                </div>
                <div class="col-12 col-sm-12 col-md-4 col-lg-4">
                    <mat-form-field appearance="outline">
                        <mat-label>Employee No</mat-label>
                        <input type="text" formControlName="TO_EMP_CODE" matInput placeholder="" autocomplete="off">
                    </mat-form-field>
                </div>
            </div>
            <div class="row" *ngIf="warningMessage == ''">
                <div class="col-12">
                    <div class="text-right">
                        <button class="btn wlt-c-furg-btn-gray mr-3" mat-dialog-close> Cancel</button>
                        <button
                            *ngIf="(this.userAccessModel.createAccess == true || this.userAccessModel.updateAccess == true || currentUser == 'superadmin')"
                            class="btn wlt-c-furg-btn-primary"> Save</button>
                    </div>
                </div>
            </div>
        </form>
        <div *ngIf="warningMessage !==''">
            <mat-label style="color:red" [innerHTML]="warningMessage"></mat-label>
        </div>
    </mat-card-content>
</mat-card>
