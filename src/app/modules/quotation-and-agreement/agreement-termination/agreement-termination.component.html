<div class="wlt-c-furg-content-header">
    <div class="container-fluid">
        <div class="row mb-2">
            <div class="col-12 col-sm-12 col-md-4 col-lg-4">
                <h1 class="mb-1">Agreement Termination</h1>
            </div><!-- /.col -->
            <div class="col-12 col-sm-12 col-md-8 col-lg-8 my-1">
                <ol class="breadcrumb float-md-right">
                    <li class="breadcrumb-item"><a href="#">Quotation & Agreement</a></li>
                    <li class="breadcrumb-item active">Agreement Termination</li>
                </ol>
            </div><!-- /.col -->
        </div><!-- /.row -->
    </div><!-- /.container-fluid -->
</div>
<mat-card>
    <mat-card-content>
        <div class="row" *ngIf="warningMessage ===''">
            <div class="col-12 col-sm-12 col-md-4 col-lg-4 order-2 order-md-1">
                <div class="text-right">
                    <mat-form-field appearance="outline">
                        <mat-label>Search</mat-label>
                        <input matInput (keyup)="applyFilter($event)" placeholder="" #input>
                    </mat-form-field>
                  <mat-form-field appearance="outline">
                    <mat-label>Branch</mat-label>
                    <mat-select (selectionChange)="changeBranch($event.value)">
                      <mat-option *ngFor="let d of branchList" value="{{d.Code}}">{{d.Name}}</mat-option>
                    </mat-select>
                  </mat-form-field>
                </div>
            </div>
            <div class="col-12 col-sm-12 col-md-8 col-lg-8 order-1 order-md-2">
                <div class="text-right pt-2">
                    <button *ngIf="this.userAccessModel.createAccess == true || currentUser == 'superadmin'" class="btn wlt-c-furg-btn-primary"
                        [routerLink]="['/quotation-and-agreement/agreement-termination/new-agreement-termination']"><mat-icon>add</mat-icon><span>New</span></button>
                </div>
            </div>
        </div>
        <div class="table-responsive" *ngIf="errorMessage =='' && warningMessage ===''">
            <table mat-table [dataSource]="dataSource" class="wlt-table table-striped" matSort
                (matSortChange)="announceSortChange($event)">

                <ng-container matColumnDef="ClientName">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header> Client Name </th>
                    <td mat-cell *matCellDef="let element" class="text-left"> {{element.ClientName}} </td>
                </ng-container>
                <ng-container matColumnDef="TerminationDate">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header> Termination Date </th>
                    <td mat-cell *matCellDef="let element" class="text-left"> {{element.TerminationDate}} </td>
                </ng-container>
                <ng-container matColumnDef="action" stickyEnd>
                    <th mat-header-cell *matHeaderCellDef style="text-align:center; width: 120px;">
                        Action
                    </th>
                    <td mat-cell *matCellDef="let row" style="text-align:center;">
                      <a *ngIf="this.userAccessModel.readAccess == true || currentUser == 'superadmin'" style="cursor:pointer;" class="wlt-c-furg-text-primary mr-2" matTooltip="Edit" [routerLink]="['/quotation-and-agreement/agreement-termination/edit-agreement-termination',row.ID]">
                        <mat-icon
                          aria-hidden="false" aria-label="edit icon">edit
                        </mat-icon>
                      </a>
<!--                        <a style="cursor:pointer;" class="wlt-c-furg-text-primary mr-2" matTooltip="Edit"><mat-icon-->
<!--                                aria-hidden="false" aria-label="edit icon">edit</mat-icon></a>-->
<!--                        &lt;!&ndash; <a style="cursor:pointer;" class="wlt-c-furg-text-success mr-2" matTooltip="View"><mat-icon aria-hidden="false" aria-label="view icon">visibility</mat-icon></a> &ndash;&gt;-->
<!--                        <a style="cursor:pointer;" class="wlt-c-furg-text-danger" matTooltip="Delete"><mat-icon-->
<!--                                aria-hidden="false" aria-label="trash icon">delete_outline</mat-icon></a>-->
                    </td>
                </ng-container>
                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
            </table>
        </div>
        <div *ngIf="warningMessage !==''">
            <mat-label style="color:red" [innerHTML]="warningMessage"></mat-label>   
           </div>
           <div *ngIf="errorMessage !==''">
            <mat-label style="color:red" [innerHTML]="errorMessage"></mat-label>   
           </div>
        <mat-paginator [pageSizeOptions]="[10, 20, 30]" showFirstLastButtons
            aria-label="Select page of periodic elements">
        </mat-paginator>
    </mat-card-content>
</mat-card>

<!-- model pop up for logic started -->
<div [style.display]="showLoadingSpinner ? 'block' : 'none'"
  style="margin-top: -20.5rem; display: block; margin-left: -6.5rem;">
  <div class="d-flex justify-content-center">
    <span class="loader"></span>
  </div>
</div>
<!-- model pop up for logic ended -->
