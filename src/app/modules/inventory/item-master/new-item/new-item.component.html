<div class="wlt-c-furg-content-header">
  <div class="container-fluid">
    <div class="row mb-2">
      <div class="col-12 col-sm-12 col-md-4 col-lg-4">
        <h1 class="mb-1">{{isEdit ? 'Edit' : 'Add'}} Item</h1>
      </div>
      <div class="col-12 col-sm-12 col-md-8 col-lg-8 my-1">
        <ol class="breadcrumb float-md-right">
          <li class="breadcrumb-item"><a class="breadcrumb-item">Inventory</a></li>
          <li class="breadcrumb-item"><a routerLink="/inventory/item-master">Item Master</a></li>
          <li class="breadcrumb-item active">{{isEdit ? 'Update' : 'New'}} Item</li>
        </ol>
      </div>
    </div>
  </div>
</div>

<mat-card>
  <mat-card-content>
    <form [formGroup]="frm" (ngSubmit)="onSubmit()">
      <div class="row">
        <div class="col-12 col-sm-12 col-md-4 col-lg-4">
          <mat-form-field appearance="outline">
            <mat-label>Transaction Type</mat-label>
            <mat-select formControlName="type" (selectionChange)="updateCategories($event.value)">
              <mat-option value="P">
                Purchase
              </mat-option>
              <mat-option value="U">
                Utility
              </mat-option>
            </mat-select>
          </mat-form-field>
        </div>
        <div class="col-12 col-sm-12 col-md-4 col-lg-4">
          <mat-form-field appearance="outline">
            <mat-label>Category</mat-label>
            <mat-select formControlName="CategoryID" >
              <mat-option *ngFor="let d of categories" [value]="d.ID">{{d.Name}}</mat-option>
            </mat-select>
          </mat-form-field>
        </div>
        <div class="col-12 col-sm-12 col-md-4 col-lg-4">
          <mat-form-field appearance="outline">
            <mat-label>Name</mat-label>
            <input type="text" formControlName="Name" matInput placeholder="" autocomplete="off">
          </mat-form-field>
        </div>
        <div class="col-12 col-sm-12 col-md-4 col-lg-4">
          <mat-form-field appearance="outline">
            <mat-label>Total Quantity (Buy)</mat-label>
            <input type="text" formControlName="Quantity" matInput placeholder="" autocomplete="off">
          </mat-form-field>
        </div>
        <div class="col-12 col-sm-12 col-md-4 col-lg-4">
          <mat-form-field appearance="outline">
            <mat-label>Quantity</mat-label>
            <input type="text" formControlName="qty" matInput placeholder="" autocomplete="off">
          </mat-form-field>
        </div>
        <div class="col-12 col-sm-12 col-md-4 col-lg-4">
          <mat-form-field appearance="outline">
            <mat-label>Buying Price</mat-label>
            <input type="text" formControlName="Price" matInput placeholder="" autocomplete="off">
          </mat-form-field>
        </div>
        <div class="col-12 col-sm-12 col-md-4 col-lg-4">
          <mat-form-field appearance="outline">
            <mat-label>Selling Price</mat-label>
            <input type="text" formControlName="SellPrice" matInput placeholder="" autocomplete="off">
          </mat-form-field>
        </div>
        <!--                <div class="col-12 col-sm-12 col-md-4 col-lg-4">-->
        <!--                    <mat-form-field appearance="outline">-->
        <!--                        <mat-label>Supplier</mat-label>-->
        <!--                        <mat-select formControlName="supplier">-->
        <!--                            <mat-option value="Supplier1">-->
        <!--                                Supplier 1-->
        <!--                            </mat-option>-->
        <!--                            <mat-option value="Supplier2">-->
        <!--                                Supplier 2-->
        <!--                            </mat-option>-->
        <!--                            <mat-option value="Supplier3">-->
        <!--                                Supplier 3-->
        <!--                            </mat-option>-->
        <!--                        </mat-select>-->
        <!--                    </mat-form-field>-->
        <!--                </div>-->
        <div class="col-12 col-sm-12 col-md-4 col-lg-4">
          <mat-form-field appearance="outline">
            <mat-label>Remarks</mat-label>
            <textarea formControlName="Remarks" matInput placeholder=""></textarea>
          </mat-form-field>
        </div>
      </div>
      <div class="row">
        <div class="col-12">
          <div class="text-right">
            <button class="btn wlt-c-furg-btn-gray mr-3" mat-dialog-close
            (click)="onCancelClick()"> Cancel</button>
            <button *ngIf="this.userAccessModel.createAccess == true || this.userAccessModel.updateAccess == true || currentUser == 'superadmin'"
            class="btn wlt-c-furg-btn-primary">  {{isEdit ? 'Update' : 'Save'}}</button>
          </div>
        </div>
      </div>
    </form>
  </mat-card-content>
</mat-card>
<!-- model pop up for logic started -->
<div [style.display]="showLoadingSpinner ? 'block' : 'none'"
  style="margin-top: -20.5rem; display: block; margin-left: -6.5rem;">
  <div class="d-flex justify-content-center">
    <span class="loader"></span>
  </div>
</div>
<!-- model pop up for logic ended -->
