<div class="wlt-c-furg-content-header">
  <div class="container-fluid">
    <div class="row mb-2">
      <div class="col-12 col-sm-12 col-md-6 col-lg-6">
        <h1 class="mb-1">Item Master</h1>
      </div><!-- /.col -->
      <div class="col-12 col-sm-12 col-md-6 col-lg-6 my-1">
        <ol class="breadcrumb float-md-right">
          <li class="breadcrumb-item"><a class="breadcrumb-item">Inventory</a></li>
          <li class="breadcrumb-item active">Item Master</li>
        </ol>
      </div><!-- /.col -->
    </div><!-- /.row -->
  </div><!-- /.container-fluid -->
</div>
<mat-card>
  <mat-card-content>
    <div class="row" *ngIf="warningMessage ===''">
      <div class="col-12 col-sm-12 col-md-4 col-lg-4 order-2 order-md-1">
        <div class="text-right">
          <mat-form-field appearance="outline">
            <mat-label>Search</mat-label>
            <input matInput (keyup)="applyFilter($event)" placeholder="" #input>
          </mat-form-field>
        </div>
      </div>
      <div class="col-12 col-sm-12 col-md-8 col-lg-8 order-1 order-md-2">
        <div class="text-right pt-2">
          <button *ngIf="this.userAccessModel.createAccess == true || currentUser == 'superadmin'"
            class="btn wlt-c-furg-btn-primary"
            [routerLink]="['/inventory/item-master/new-item']"><mat-icon>add</mat-icon><span>New</span></button>
        </div>
      </div>
    </div>
    <div class="table-responsive" *ngIf="errorMessage =='' && warningMessage ===''">
      <table mat-table [dataSource]="dataSource" class="wlt-table table-striped" matSort
        (matSortChange)="announceSortChange($event)">
        <!--            <ng-container matColumnDef="s_no">-->
        <!--              <th mat-header-cell *matHeaderCellDef mat-sort-header> S.No </th>-->
        <!--              <td mat-cell *matCellDef="let element" class="text-left"> {{element.s_no}} </td>-->
        <!--            </ng-container>-->

        <ng-container matColumnDef="CategoryName">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Category Name </th>
          <td mat-cell *matCellDef="let element" class="text-left"> {{element.CategoryName}} </td>
        </ng-container>
        <ng-container matColumnDef="ItemName">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Item Name </th>
          <td mat-cell *matCellDef="let element" class="text-left"> {{element.ItemName}} </td>
        </ng-container>
        <ng-container matColumnDef="Quantity">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Quantity</th>
          <td mat-cell *matCellDef="let element" class="text-left"> {{element.Quantity}} </td>
        </ng-container>
        <ng-container matColumnDef="Price">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Buying Price </th>
          <td mat-cell *matCellDef="let element" class="text-left"> {{element.Price}} </td>
        </ng-container>
        <ng-container matColumnDef="SellPrice">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Selling Price</th>
          <td mat-cell *matCellDef="let element" class="text-left"> {{element.SellPrice}} </td>
        </ng-container>
        <!--              <ng-container matColumnDef="supplier_name">-->
        <!--                <th mat-header-cell *matHeaderCellDef mat-sort-header> Supplier Name </th>-->
        <!--                <td mat-cell *matCellDef="let element" class="text-left"> {{element.supplier_name}} </td>-->
        <!--              </ng-container>-->
        <ng-container matColumnDef="Remarks">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Remarks</th>
          <td mat-cell *matCellDef="let element" class="text-left"> {{element.Remarks}} </td>
        </ng-container>

        <ng-container matColumnDef="action" stickyEnd>
          <th mat-header-cell *matHeaderCellDef style="text-align:center; width: 120px;">
            Action
          </th>
          <td mat-cell *matCellDef="let element" style="text-align:center;">
            <a *ngIf="this.userAccessModel.readAccess == true || currentUser == 'superadmin'" style="cursor:pointer;"
              class="wlt-c-furg-text-primary mr-2" matTooltip="View"
              [routerLink]="['/inventory/item-master/new-item',element.ID]">
              <mat-icon aria-hidden="false" aria-label="edit icon">edit</mat-icon>
            </a>
            <!-- <a style="cursor:pointer;" class="wlt-c-furg-text-success mr-2" matTooltip="View"><mat-icon aria-hidden="false" aria-label="view icon">visibility</mat-icon></a> -->
            <a *ngIf="this.userAccessModel.deleteAccess == true || currentUser == 'superadmin'" style="cursor:pointer;"
              class="wlt-c-furg-text-danger" matTooltip="Delete" (click)="deleteClickButton(element.ID)"><mat-icon aria-hidden="false"
                aria-label="trash icon">delete_outline</mat-icon></a>
          </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </div>
    <div *ngIf="warningMessage !==''">
      <mat-label style="color:red" [innerHTML]="warningMessage"></mat-label>
    </div>
    <div *ngIf="errorMessage !==''">
      <mat-label style="color:red" [innerHTML]="errorMessage"></mat-label>
    </div>
    <mat-paginator [pageSizeOptions]="[10, 20, 30]" showFirstLastButtons aria-label="Select page of periodic elements">
    </mat-paginator>


  </mat-card-content>
</mat-card>

<!-- model pop up for logic started -->
<div [style.display]="showLoadingSpinner ? 'block' : 'none'"
  style="margin-top: -20.5rem; display: block; margin-left: -6.5rem;">
  <div class="d-flex justify-content-center">
    <span class="loader"></span>
  </div>
</div>
<!-- model pop up for logic ended -->
