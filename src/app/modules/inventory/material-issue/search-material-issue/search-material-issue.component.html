<p class="close" [mat-dialog-close]="true">
  <mat-icon class="close-icon">close</mat-icon>
</p>
<h1 mat-dialog-title>Search Material Issue</h1>
<form [formGroup]="frm">
  <mat-dialog-content>
    <div class="row">
      <div class="col-12 col-sm-12 col-md-3 col-lg-3">
        <div class="text-right">
          <mat-form-field appearance="outline">
            <mat-label>Search</mat-label>
            <input matInput (keyup)="applyFilter($event)" placeholder="" #input>
          </mat-form-field>
        </div>
      </div>
      <div class="col-12 col-sm-12 col-md-3 col-lg-3">
        <mat-form-field appearance="outline">
          <mat-label>Branch</mat-label>
          <mat-select formControlName="Branch" (selectionChange)="onChange()">
            <mat-option *ngFor="let d of branchList" value="{{d.Code}}">{{d.Name}}</mat-option>
          </mat-select>
        </mat-form-field>
      </div>
      <div class="col-12 co-sm-12 col-md-6 col-lg-6">

        <mat-paginator [pageSizeOptions]="[10, 20, 30]"
                       showFirstLastButtons
                       aria-label="Select page of periodic elements">
        </mat-paginator>
      </div>
    </div>
    <div class="row">
      <div class="col-12 col-sm-12 col-md-12 col-lg-12">
        <div class="table-responsive my-3">
          <table mat-table [dataSource]="dataSource" class="wlt-table table-striped" matSort>
            <ng-container matColumnDef="InvoiceNo">
              <th mat-header-cell *matHeaderCellDef mat-sort-header>InvoiceNo</th>
              <td mat-cell *matCellDef="let element" class="text-left"> {{element.InvoiceNo}} </td>
            </ng-container>
            <ng-container matColumnDef="InvoiceDate">
              <th mat-header-cell *matHeaderCellDef mat-sort-header>InvoiceDate</th>
              <td mat-cell *matCellDef="let element" class="text-left"> {{element.InvoiceDate}} </td>
            </ng-container>

            <ng-container matColumnDef="action" stickyEnd>
              <th mat-header-cell *matHeaderCellDef style="text-align:center; width: 120px;">
                Action
              </th>
              <td mat-cell *matCellDef="let element" style="text-align:center;">
                <a style="cursor:pointer;" class="wlt-c-furg-text-primary mr-2" matTooltip="Select Employee" (click)="select(element)">
                  <mat-icon aria-hidden="false" aria-label="add icon">add</mat-icon>
                </a>
              </td>
            </ng-container>
            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
          </table>
        </div>

      </div>
    </div>
  </mat-dialog-content>
</form>
