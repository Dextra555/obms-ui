<div class="wlt-c-furg-content-header">
    <div class="container-fluid">
        <div class="row mb-2">
            <div class="col-12 col-sm-12 col-md-4 col-lg-4">
                <h1 class="mb-1">Invoice Recycle Bin</h1>
            </div><!-- /.col -->
            <div class="col-12 col-sm-12 col-md-8 col-lg-8 my-1">
                <ol class="breadcrumb float-md-right">
                    <li class="breadcrumb-item"><a href="#">Finance</a></li>
                    <li class="breadcrumb-item"><a href="#">Invoice Recycle Bin</a></li>
                </ol>
            </div><!-- /.col -->
        </div><!-- /.row -->
    </div><!-- /.container-fluid -->
</div>
<mat-card>
    <mat-card-content>
        <form [formGroup]="frm">
            <div class="row" *ngIf="warningMessage ===''">
                <div class="col-12 col-sm-12 col-md-12 col-lg-4">
                    <mat-form-field appearance="outline">
                        <mat-label>Branch</mat-label>
                        <mat-select formControlName="branch" (selectionChange)="deleteInvoiceDetailById()">
                          <mat-option *ngFor="let d of branchList" value="{{d.Code}}">{{d.Name}}</mat-option>
                        </mat-select>
                    </mat-form-field>
                </div>
                <div class="col-12 col-sm-12 col-md-12 col-lg-12">
                    <div class="table-responsive my-3" *ngIf="errorMessage =='' && warningMessage ===''">
                        <table mat-table [dataSource]="dataSource" class="wlt-table table-striped" matSort
                            (matSortChange)="announceSortChange($event)">
                            <ng-container matColumnDef="action">
                                <th mat-header-cell *matHeaderCellDef mat-sort-header> Action </th>
                                <td mat-cell *matCellDef="let element; let index= index;" class="text-left">
                                    <mat-checkbox (change)="checkChange($event,index)"></mat-checkbox>
                                </td>
                            </ng-container>
                            <ng-container matColumnDef="InvoiceNo">
                                <th mat-header-cell *matHeaderCellDef mat-sort-header> Invoice No </th>
                                <td mat-cell *matCellDef="let element" class="text-left"> {{element.InvoiceNo}} </td>
                            </ng-container>
                            <ng-container matColumnDef="InvoiceDate">
                                <th mat-header-cell *matHeaderCellDef mat-sort-header> Invoice Period </th>
                                <td mat-cell *matCellDef="let element" class="text-left"> {{element.InvoiceDate}} </td>
                            </ng-container>
                            <ng-container matColumnDef="ClientName">
                                <th mat-header-cell *matHeaderCellDef mat-sort-header> Client Name </th>
                                <td mat-cell *matCellDef="let element" class="text-left"> {{element.ClientName}} </td>
                            </ng-container>

                            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
                        </table>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-12">
                    <div class="text-right">
                        <button class="btn wlt-c-furg-btn-gray mr-3"> Cancel</button>
                        <a *ngIf="this.userAccessModel.createAccess == true ||this.userAccessModel.updateAccess == true || currentUser == 'superadmin'" 
                        class="btn wlt-c-furg-btn-primary" (click)="restoreSubmit()"> Restore</a>
                    </div>
                </div>
            </div>
        </form>
        <div *ngIf="warningMessage !==''">
            <mat-label style="color:red" [innerHTML]="warningMessage"></mat-label>
          </div>
          <div *ngIf="errorMessage !==''">
            <mat-label style="color:red" [innerHTML]="errorMessage"></mat-label>
          </div>
    </mat-card-content>
</mat-card>

<!-- model pop up for logic started -->
<div [style.display]="showLoadingSpinner ? 'block' : 'none'"
  style="margin-top: -20.5rem; display: block; margin-left: -6.5rem;">
  <div class="d-flex justify-content-center">
    <span class="loader"></span>
  </div>
</div>
<!-- model pop up for logic ended -->
