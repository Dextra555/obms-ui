<div class="wlt-c-furg-content-header">
    <div class="container-fluid">
        <div class="row mb-2">
            <div class="col-12 col-sm-12 col-md-4 col-lg-4">
                <h1 class="mb-1">Reports/Finance/ Tax Invoice Report Computer Generated</h1>
            </div><!-- /.col -->
            <div class="col-12 col-sm-12 col-md-8 col-lg-8 my-1">
                <ol class="breadcrumb float-md-right">
                    <li class="breadcrumb-item"><a href="#">Report</a></li>
                    <li class="breadcrumb-item"><a href="#">Tax Invoice Report Computer Generated.</a></li>
                </ol>
            </div><!-- /.col -->
        </div><!-- /.row -->
    </div><!-- /.container-fluid -->
</div>

<!-- Invoice Display with DomSanitized HTML (like Client Compliance Report) -->
<div *ngIf="invoiceHtml && errorMessage === ''" class="invoice-container mt-4">
    <div class="row mb-3">
        <div class="col-12 text-right">
            <button class="btn wlt-c-furg-btn-primary m-1" (click)="printInvoice()">
                <i class="fas fa-print"></i> Print Invoice
            </button>
        </div>
    </div>
    <div [innerHTML]="invoiceHtml" class="invoice-display"></div>
</div>

<!-- Error Message Display -->
<div *ngIf="errorMessage !== ''">
    <mat-label style="color:red" [innerHTML]="errorMessage"></mat-label>
</div>

<!-- Loading Spinner -->
<div [style.display]="showLoadingSpinner ? 'block' : 'none'"
    style="margin-top: -10.5rem; display: block; margin-left: -6.5rem;">
    <div class="d-flex justify-content-center">
        <span class="loader"></span>
    </div>
</div>

<style>
    .invoice-container {
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        padding: 20px;
    }
    
    .invoice-display {
        background: white;
        border-radius: 8px;
        overflow: hidden;
    }
    
    .alert {
        border-radius: 8px;
        border-left: 4px solid #17a2b8;
    }
    
    @media print {
        .wlt-c-furg-content-header,
        .container-fluid.mb-3,
        .row.mb-3,
        .no-print {
            display: none !important;
        }
        
        .invoice-container {
            box-shadow: none !important;
            margin: 0 !important;
            padding: 0 !important;
            border-radius: 0 !important;
        }
        
        .invoice-display {
            box-shadow: none !important;
            margin: 0 !important;
            padding: 0 !important;
        }
    }
</style>
