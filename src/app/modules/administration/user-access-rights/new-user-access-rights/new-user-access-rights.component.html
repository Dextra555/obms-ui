<div class="wlt-c-furg-content-header">
    <div class="container-fluid">
        <div class="row mb-2">
            <div class="col-12 col-sm-12 col-md-4 col-lg-4">
                <h1 class="md-1">{{userAccessTitle == 'new'?'New User Access Rights': 'Edit User Access Rights'}}</h1>
            </div><!-- /.col -->
            <div class="col-12 col-sm-12 col-md-8 col-lg-8 my-1">
                <ol class="breadcrumb float-md-right">
                    <li class="breadcrumb-item"><a routerLink="/dashboard">Master</a></li>
                    <li class="breadcrumb-item"><a routerLink="/administration/user-access-rights">User Access
                            Rights</a></li>
                    <li class="breadcrumb-item active">{{userAccessTitle == 'new'?'New User Access Rights': 'Edit User Access Rights'}}</li>
                </ol>
            </div><!-- /.col -->
        </div><!-- /.row -->
    </div><!-- /.container-fluid -->
</div>
<mat-card>
    <mat-card-content>
        <form [formGroup]="userAccessForm">
            <div class="row">
                <div class="col-12 col-sm-12 col-md-12 col-lg-2">
                    <mat-form-field appearance="fill">
                        <mat-label>Select Category</mat-label>
                        <mat-select [(value)]="selectedCategory" (selectionChange)="onCategoryChange()">
                            <mat-option *ngFor="let category of categories" [value]="category">
                                {{ category }}
                            </mat-option>
                        </mat-select>
                    </mat-form-field>
                </div>
                <div class="col-12 col-sm-12 col-md-12 col-lg-6 button-group">
                    <button class="btn wlt-c-furg-btn-primary" mat-dialog-actions (click)="handleButtonClick('View')"> View</button>
                    <button class="btn wlt-c-furg-btn-primary" mat-dialog-actions (click)="handleButtonClick('new')"> New</button>
                    <button class="btn wlt-c-furg-btn-primary" mat-dialog-actions (click)="handleButtonClick('update')"> Update</button>
                    <button class="btn wlt-c-furg-btn-primary" mat-dialog-actions (click)="handleButtonClick('delete')"> Delete</button>
                    <button *ngIf="selectedCategory === 'Payroll'" class="btn wlt-c-furg-btn-success" mat-dialog-actions (click)="addRbiBankAdvanceScreen()"> Add RBI Advance Screen</button>
                </div>                                

            </div>
            <div class="col-12 col-sm-12 col-md-12 col-lg-12">
                <div class="row">
                    <div class="col-12 col-sm-12 col-md-4 col-lg-12">
                        <form [formGroup]="dynamicForm">
                            <div formArrayName="formArray">
                                <div *ngFor="let control of formArray; let i = index" [formGroupName]="i">
                                    <div class="row">
                                        <div class="col-12 col-sm-12 col-md-12 col-lg-4">
                                            <mat-form-field>
                                                <input type="text" matInput formControlName="ScreenName"
                                                    readonly="true"/>
                                            </mat-form-field>
                                        </div>
                                        <div class="col-12 col-sm-12 col-md-12 col-lg-8">
                                            <ng-container *ngFor="let item of [i]">
                                                <mat-checkbox formControlName="Read" [disabled]="isReadEditable"
                                                    style="margin-right: 10px;">View</mat-checkbox>
                                                <mat-checkbox  formControlName="Create" [disabled]="isCreateEditable"
                                                    style="margin-right: 10px;">New</mat-checkbox>
                                                <mat-checkbox  formControlName="Update" [disabled]="isUpdateEditable"
                                                    style="margin-right: 10px;">Update</mat-checkbox>
                                                <mat-checkbox formControlName="Delete" [disabled]="isDeleteEditable"
                                                    style="margin-right: 10px;">Delete</mat-checkbox>
                                            </ng-container>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-12">
                    <div class="text-right">
                        <button class="btn wlt-c-furg-btn-gray mr-3" mat-dialog-close
                            (click)="clearUserAccesstDetails()"> Cancel</button>
                        <button *ngIf="(this.userAccessModel.updateAccess == true || this.userAccessModel.createAccess == true || currentUser == 'superadmin')"  
                                class="btn wlt-c-furg-btn-primary" [disabled]="userAccessForm.invalid"
                            (click)="savebuttonClick()"> Save</button>
                    </div>
                </div>
            </div>
        </form>
    </mat-card-content>
</mat-card>

<!-- model pop up for logic started -->
<div [style.display]="showLoadingSpinner ? 'block' : 'none'"
    style="margin-top: -10.5rem; display: block; margin-left: -6.5rem;">
    <div class="d-flex justify-content-center">
        <span class="loader"></span>
    </div>
</div>
<!-- model pop up for logic ended -->
