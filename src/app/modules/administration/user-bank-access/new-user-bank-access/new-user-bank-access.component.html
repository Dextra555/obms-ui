<div class="wlt-c-furg-content-header">
    <div class="container-fluid">
        <div class="row mb-2">
            <div class="col-12 col-sm-12 col-md-4 col-lg-4">
                <h1 class="md-1">{{userBankAccessTitle == 'new'?'New User Bank Access': 'Edit User Bank Access'}}</h1>
            </div><!-- /.col -->
            <div class="col-12 col-sm-12 col-md-8 col-lg-8 my-1">
                <ol class="breadcrumb float-md-right">
                    <li class="breadcrumb-item"><a routerLink="/dashboard">Master</a></li>
                    <li class="breadcrumb-item"><a routerLink="/administration/user-bank-access">User Bank Access
                            </a></li>
                    <li class="breadcrumb-item active">{{userBankAccessTitle == 'new'?'New User Bank Access': 'Edit User Bank Access'}}</li>
                </ol>
            </div><!-- /.col -->
        </div><!-- /.row -->
    </div><!-- /.container-fluid -->
</div>
<mat-card>
    <mat-card-content>
        <form [formGroup]="userBankAccessForm">            
            <div class="row">
                <div class="col-12 col-sm-12 col-md-12 col-lg-12">
                    <form [formGroup]="dynamicForm">
                        <div formArrayName="formArray">
                            <div *ngFor="let control of formArray; let i = index" [formGroupName]="i">
                    <div class="row">                        
                    <div class="col-12 col-sm-12 col-md-12 col-lg-3">
                        <mat-form-field>                            
                            <input type="text" matInput formControlName="BankCode" [readonly]="true" autocomplete="off" 
                             value="{{control.get('BankCode')?.value}}"/>
                        </mat-form-field>
                    </div>
                    <div class="col-12 col-sm-12 col-md-12 col-lg-8">
                        <ng-container *ngFor="let item of [1]">
                            <mat-checkbox  formControlName="IsAllowed" (change)="checkboxChanged(i, 'IsAllowed')">IS Allowed</mat-checkbox>                            
                        </ng-container>
                    </div>
                    <div class="col-12 col-sm-12 col-md-12 col-lg-1">
                        <mat-form-field style="display: none;"> 
                            <input type="text" matInput formControlName="BankID" [readonly]="true" autocomplete="off"
                                value="{{control.get('BankID')?.value}}" />
                        </mat-form-field>
                    </div>
                </div>
                </div>
                        </div>
                    </form>
                </div>
            </div>
            <div class="row">
                <div class="col-12">
                    <div class="text-right">
                        <button class="btn wlt-c-furg-btn-gray mr-3" mat-dialog-close
                            (click)="clearUserBranchAccesstDetails()"> Cancel</button>
                        <button *ngIf="(this.userAccessModel.createAccess == true || this.userAccessModel.updateAccess == true || currentUser == 'superadmin')"
                        class="btn wlt-c-furg-btn-primary" [disabled]="userBankAccessForm.invalid"
                        (click)="savebuttonClick()"> {{userBankAccessForm.get('ID')?.value == 0 ? 'Save' : 'Update' }}</button>
                    </div>
                </div>
            </div>
        </form>
    </mat-card-content>
</mat-card>

<!-- model pop up for logic started -->
<div [style.display]="showLoadingSpinner ? 'block' : 'none'"
    style="margin-top: -10.5rem; display: block; margin-left: -6.5rem;">
    <div class="d-flex justify-content-center">
        <span class="loader"></span>
    </div>
</div>
<!-- model pop up for logic ended -->
