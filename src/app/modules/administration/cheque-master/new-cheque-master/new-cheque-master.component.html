<div class="wlt-c-furg-content-header">
    <div class="container-fluid">
        <div class="row mb-2">
            <div class="col-12 col-sm-12 col-md-4 col-lg-4">
                <h1 class="md-1">{{chequeMasterTitle == 'new'?'New Cheque Master': 'Edit Cheque Master'}}</h1>
            </div><!-- /.col -->
            <div class="col-12 col-sm-12 col-md-8 col-lg-8 my-1">
                <ol class="breadcrumb float-md-right">
                    <li class="breadcrumb-item"><a routerLink="/dashboard">Master</a></li>
                    <li class="breadcrumb-item"><a routerLink="/administration/cheque-master">Cheque Master</a></li>
                    <li class="breadcrumb-item active">{{chequeMasterTitle == 'new'?'New Cheque Master': 'Edit Cheque Master'}}</li>
                </ol>
            </div><!-- /.col -->
        </div><!-- /.row -->
    </div><!-- /.container-fluid -->
</div>
<mat-card>
    <mat-card-content>
        <form [formGroup]="chequeMasterForm">
            <div class="row">
                <div class="col-12 col-sm-12 col-md-4 col-lg-4">
                    <mat-form-field appearance="outline">
                        <mat-label>Account Name</mat-label>
                        <mat-select formControlName="BankId">
                            <mat-option *ngFor="let bank of bankMasterList" [value]="bank.BankId">
                                {{ bank.Accname }}
                            </mat-option>
                        </mat-select>
                    </mat-form-field>
                </div>
            </div>
            <div class="row">
                <div class="col-12 col-sm-12 col-md-12 col-lg-2">                   
                    <mat-form-field appearance="outline">
                        <mat-label>Cheque Start</mat-label>
                        <input matInput placeholder="" type="number" formControlName="ChequeStart">
                      </mat-form-field>
                </div>
                <mat-label>To</mat-label>
                <div class="col-12 col-sm-12 col-md-12 col-lg-2">
                    <mat-form-field appearance="outline">
                        <mat-label>Cheque End</mat-label>
                        <input matInput placeholder="" type="number" formControlName="ChequeEnd">
                      </mat-form-field>
                </div>
            </div>
            <div class="row">               
                <div class="col-12 col-sm-12 col-md-12 col-lg-4">
                    <mat-checkbox formControlName="IsActive">Is Active</mat-checkbox>
                </div>
            </div>
            
            <div class="row">
                <div class="col-12">
                    <div class="text-right">
                        <button class="btn wlt-c-furg-btn-gray mr-3" mat-dialog-close
                            (click)="clearMasterListDetails()"> Cancel</button>
                        <button *ngIf="(this.userAccessModel.updateAccess == true || this.userAccessModel.createAccess == true || currentUser == 'superadmin')" 
                        class="btn wlt-c-furg-btn-primary" [disabled]="chequeMasterForm.invalid" (click)="savebuttonClick()"> Save</button>
                    </div>
                </div>
            </div>
        </form>
    </mat-card-content>
</mat-card>

<!-- model pop up for logic started -->
<div [style.display]="showLoadingSpinner ? 'block' : 'none'"
    style="margin-top: -10.5rem; display: block; margin-left: -6.5rem;">
    <div class="d-flex justify-content-center">
        <span class="loader"></span>
    </div>
</div>
<!-- model pop up for logic ended -->
