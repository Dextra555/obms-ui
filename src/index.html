<body id="id_body" class="">
  <app-root></app-root>
  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  <script type="text/javascript">
    (function ($) {
      'use strict';
      $(document).on('mouseenter mouseleave', '.wlt-c-furg-sidebar', function (ev) {
        var body = $('body');
        var sidebarIconOnly = body.hasClass("wlt-c-furg-sidebar-icon-only");
        var sidebarFixed = body.hasClass("sidebar-fixed");
        if (!('ontouchstart' in document.documentElement)) {
          if (sidebarIconOnly) {
              if (ev.type === 'mouseenter') {
                body.removeClass('wlt-c-furg-sidebar-icon-only');
                body.addClass('sidebar-fixed');
              }
          }
          if (sidebarFixed) {
            if (ev.type === 'mouseleave') {
              body.addClass('wlt-c-furg-sidebar-icon-only');
              body.removeClass('sidebar-fixed');
            }
          }
        }
      });
    })(jQuery);
  </script>
  <script type="text/javascript">
    (function ($) {
      'use strict';
      $(function () {
        $('[data-toggle="minimize"]').on("click", function () {
          $('.wlt-c-furg-sidebar-offcanvas').toggleClass('active')
        });
      });
    })(jQuery);
  </script>
  <script type="text/javascript">
     (function ($) {
      'use strict';
      var body = $('body');
      $(function () {
        $('.nav-item a:not([data-toggle])').on("click", function () {
          body.removeClass('wlt-c-furg-sidebar-icon-only');
        });
      });
    })(jQuery);
  </script>
  <script>
    function sidebartoggle() {
      document.getElementById("id_body").classList.toggle("wlt-c-furg-sidebar-icon-only");
    }
  </script>
</body>
</html>
